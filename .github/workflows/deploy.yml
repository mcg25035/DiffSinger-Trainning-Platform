name: Deploy to Self-Hosted Server

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy to Production Directory
        run: |
          # 定義您的正式專案路徑
          PROD_DIR="/home/codingbear/DiffSinger-Trainning-Platform"
          
          # 進入正式目錄
          cd "$PROD_DIR"
          
          # 確保代碼是最新的
          git fetch origin master
          git reset --hard origin/master
          
          # 授權本次更新 (因為是由 CI 觸發，我們自動信任)
          chmod +x scripts/trust_manager.sh
          ./scripts/trust_manager.sh COMMIT
          
          # 執行部署腳本
          # 因為我們剛剛修改了 deploy.sh，它現在不會在路徑相同時再次要求 Sudo 密碼
          chmod +x deploy.sh
          ./deploy.sh
